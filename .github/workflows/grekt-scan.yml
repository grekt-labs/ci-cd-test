name: Grekt Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Scan artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure GitHub Packages registry
        run: |
          echo "@grekt-labs:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GREKT_PACKAGES_NPMRC }}" >> ~/.npmrc

      - name: Install grekt
        run: npm install -g @grekt/cli

      - name: Install artifacts
        run: grekt install

      - name: Scan with --fail-on suspicious
        run: grekt scan --fail-on suspicious
        env:
          GREKT_TRUST_KEY: ${{ secrets.GREKT_TRUST_KEY }}
